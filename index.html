    <script>
      // Prevent FOUC: aplicar tema antes del paint inicial.
      (function () {
        try {
          var stored = localStorage.getItem("portfolio-ui-theme");
          var theme = stored || "dark";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          document.documentElement.classList.add(resolved);
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <script>
      // GitHub Pages SPA redirect: si llegamos vía 404.html con ?/path,
      // restauramos la URL real para que React Router la tome.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
