<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="100%" height="100%" fill="#0a0a0a"/>

  <!-- Grid técnico tenue -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#fafafa" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="mask" cx="50%" cy="50%" r="55%">
      <stop offset="60%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="100%" height="100%" fill="url(#mask)"/>
    </mask>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Borde tenue + esquinas reforzadas (visor) -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#fafafa" stroke-opacity="0.12" stroke-width="1"/>
  <g stroke="#fafafa" stroke-opacity="0.4" stroke-width="2" fill="none">
    <path d="M32,72 L32,32 L72,32"/>
    <path d="M1128,32 L1168,32 L1168,72"/>
    <path d="M32,558 L32,598 L72,598"/>
    <path d="M1128,598 L1168,598 L1168,558"/>
  </g>

  <!-- HUD top-left: ID + REC -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#fafafa">
    <text x="60" y="80" font-size="13" opacity="0.55" letter-spacing="3">RIQEDEV</text>
    <circle cx="64" cy="105" r="4" fill="#ef4444"/>
    <text x="78" y="110" font-size="12" opacity="0.55">REC</text>
  </g>

  <!-- HUD top-right: cámara meta -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#fafafa" text-anchor="end" opacity="0.55">
    <text x="1140" y="80" font-size="12" letter-spacing="2">RAW   ISO AUTO</text>
    <text x="1140" y="105" font-size="11" letter-spacing="2">1/2000   ƒ/2.8</text>
  </g>

  <!-- Título principal -->
  <g text-anchor="middle" fill="#fafafa">
    <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="140" font-weight="800" letter-spacing="-5">RIQEDEV<tspan fill="#fafafa" opacity="1">.</tspan></text>
    <text x="600" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="22" letter-spacing="8" opacity="0.55">SOFTWARE ENGINEER  //  FULL-STACK DEVELOPER</text>
  </g>

  <!-- Subtítulo brand -->
  <g text-anchor="middle">
    <text x="600" y="470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="4" fill="#fafafa" opacity="0.4">// TAKE 01 // ENGINEERING THROUGH THE LENS</text>
  </g>

  <!-- HUD bottom -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#fafafa" opacity="0.4" font-size="12">
    <text x="60" y="582">AF-C  WIDE</text>
    <text x="1140" y="582" text-anchor="end">[ 100% ]</text>
  </g>
</svg>
